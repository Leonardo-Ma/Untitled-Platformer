name: Generate Changelog on Tag

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers when a version tag like v1.0.0 is pushed

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit back to the repo

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required so git-cliff can see the whole history
          ref: main

      - name: Generate Changelog with git-cliff
        uses: orhun/git-cliff-action@v3
        id: git-cliff
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md

      - name: Commit CHANGELOG.md to Repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          # Only commit if there are actually changes
          if ! git diff-index --quiet HEAD; then
            git commit -m "Docs: Update CHANGELOG.md for ${{ github.ref_name }} [skip ci]"
            git push origin HEAD:main # Adjust 'main' if your default branch is named differently
          fi
