- name: Generate diff changelog
  run: |
    git cliff --latest --strip header -o CHANGELOG.generated.md

- name: Compare with committed CHANGELOG.md
  run: |
    if ! diff -u CHANGELOG.md CHANGELOG.generated.md; then
      echo "CHANGELOG.md is out of date!"
      echo "Run git-cliff locally and commit the result before tag."
      exit 1
    fi

    echo "Changelog is correct."
