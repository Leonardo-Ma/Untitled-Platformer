# This will block a commit due to format or certain checks
# Will also automatically fix as unstaged change when possible

exclude: |
  (?x)^(
    \.godot/|
    \.import/|
    .*\.import$|
    (^|/)build/|
    addons/|
    site/|
    .*\.mtlx$|
    .*\.drawio$|
    .*\.png$|
    .*\.svg$|
    .*\.jpg$|
    .*\.jpeg$|
    .*\.glb$|
    .*\.ogg$|
    .*\.wav$
  )

default_install_hook_types:
- pre-commit
- commit-msg

default_stages: [pre-commit]

repos:
  - repo: local
    hooks:
      - id: check-filenames-are-lowercase
        name: check that filenames are lowercase
        entry: filenames must be lower-case or lower_case only
        language: fail
        files: '[^a-z0-9._/-]'
        exclude: |
          (?x)^(
              [^/]+$|
              .*/ROADMAP\.md$|
              \.docs/documentation/|
              \script_templates/|
          )

      # Scenes / Resources
      - id: no-custom-maximum-size
        name: "ban custom_maximum_size | breaks different resolution layouts | use anchors, size_flags, and custom_minimum_size"
        language: pygrep
        entry: 'custom_maximum_size'
        files: \.(tscn|tres)$

      - id: no-editor-signal-connections
        name: "ban editor signal connections | couples scene structure to logic | use signal.connect() in code"
        language: pygrep
        entry: '^\[connection '
        files: \.tscn$

      - id: no-custom-type-nodes
        name: ban non unique custom type nodes | editor caches class and misses script changes | use generic Node + attach script
        language: system
        entry: >
          awk '
            /^\[/ { in_node = ($0 ~ /^\[node /) }
            in_node && /metadata\/_custom_type_script/ {
              print FILENAME ":" FNR ": custom node found"
              exit 1
            }
          '
        files: \.tscn$

      # Architecture
      - id: no-scene-tree-traversal
        name: "ban scene tree climbing | assumes scene structure and breaks on refactor | use @export, Groups, or Autoloads"
        language: pygrep
        entry: '(get_parent\(\)\.get_parent\(\)|find_parent\(|get_node\(\s*"\.\.)'
        files: \.gd$

      - id: no-get-node-or-null
        name: "ban get_node_or_null | fails silently | use get_node()"
        language: pygrep
        entry: 'get_node_or_null\('
        files: \.gd$

      - id: no-string-group-names
        name: "ban raw string group names | silent fail | use Groups autoload constants"
        language: pygrep
        entry: '(add_to_group|remove_from_group|is_in_group|get_tree\(\)\.get_nodes_in_group)\(\s*"'
        files: \.gd$

      - id: no-hardcoded-res-paths
        name: "ban hardcoded res:// paths | breaks on export and bypasses UID system | use preload with uid"
        language: pygrep
        entry: '(load|preload)\(\s*"res://'
        files: \.gd$

      - id: no-runtime-load
        name: "ban ResourceLoader.load at runtime | causes performance drop and bypasses UID preloading | use preload"
        language: pygrep
        entry: 'ResourceLoader\.load\('
        files: \.gd$
        exclude: ^src/systems/save/

      - id: no-input-action-in-ui
        name: "ban Input.is_action in UI scripts | UI must not poll input directly | use _unhandled_input or signals"
        language: pygrep
        entry: 'Input\.(is_action_pressed|is_action_just_pressed|is_key_pressed)\('
        files: src/ui/.*\.gd$

      - id: no-os-execute
        name: "ban OS.execute | unsafe | use Godot APIs"
        language: pygrep
        entry: 'OS\.execute\s*\('
        files: \.gd$

      - id: no-super-ready
        name: "ban super._ready() | fail prone | use @abstract func _child_ready()"
        language: pygrep
        entry: 'super\._ready\(\)'
        files: \.gd$

      - id: no-magic-numbers-wait
        name: "ban create_timer with magic numbers | error prone | extract duration to a const with proper naming"
        language: pygrep
        entry: 'create_timer\(\s*[0-9]'
        files: \.gd$

      - id: no-delta-on-impulse
        name: "ban delta on impulse calls | impulses are instant and must not scale with frame rate | remove delta multiplication"
        language: pygrep
        entry: 'apply_(impulse|central_impulse|torque_impulse)\(.*\*\s*delta'
        files: \.gd$

      - id: no-delta-missing-on-continuous-movement
        name: "ban frame dependent continuous movement | position changes accumulate per frame and must be frame independent | multiply by delta"
        language: pygrep
        entry: '(position|translation)\s*\+=\s*(?!.*\*\s*delta)(?!.*delta\s*\*)'
        files: \.gd$

      # Godot 3 syntax

      - id: no-godot3-yield
        name: "ban yield() | Godot 3 coroutine syntax | use await"
        language: pygrep
        entry: '\byield\s*\('
        files: \.gd$

      - id: no-godot3-randomize
        name: "ban randomize() | read docs | use RandomNumberGenerator or randf()"
        language: pygrep
        entry: '\brandomize\s*\(\)'
        files: \.gd$

      - id: no-godot3-connect-syntax
        name: "ban old connect() with string method | Godot 3 signal syntax | use signal.connect()"
        language: pygrep
        entry: '\.connect\(\s*"'
        files: \.gd$

  - repo: https://github.com/qoomon/git-conventional-commits
    rev: f00599350f1d22c14f431b4e458f1076124c0c0d # 2.9.0
    hooks:
      - id: conventional-commits
        stages: [commit-msg]

  - repo: https://github.com/Scony/godot-gdscript-toolkit
    rev: b7a4935fc6483d51837f7080598dad456f4f7645 # 4.5.0
    hooks:
      - id: gdformat
        name: Check gdscript format
        files: \.gd$
        args: [--line-length=150]
      - id: gdlint
        name: Lint gdscript
        files: \.gd$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # v6.0.0
    hooks:
      - id: detect-private-key # Detect the presence of private keys
      - id: check-added-large-files # Check for files that are larger than a threshold
        args: ['--maxkb=10240']
      - id: check-merge-conflict # Check for files that contain merge conflict strings
      - id: check-toml
        files: \.toml$
      - id: check-yaml
        files: \.ya?ml$
      - id: check-json
        files: \.json$
      - id: pretty-format-json # Sort and ident keys
        files: \.json$
      - id: trailing-whitespace # Trims trailing whitespace
        files: \.(gd|md|json|ya?ml)$
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer # Ensure that files ends with newline
      - id: check-vcs-permalinks # Ensure that links to vcs websites are permalinks
      - id: check-case-conflict # Check for files that would conflict in case-insensitive filesystems
      - id: check-illegal-windows-names # Check for files that cannot be created on Windows
      - id: check-symlinks # Checks for symlinks which do not point to anything

  - repo: https://github.com/codespell-project/codespell
    rev: 2ccb47ff45ad361a21071a7eedda4c37e6ae8c5a # v2.4.2
    hooks:
      - id: codespell
        exclude: \.(tscn|tres|res)$
